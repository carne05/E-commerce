<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Cart-AURÈA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
       <h1>
            <a href="index.html" class="home">AURÉA</a>
           <a href="products.html" class="shop">Shop all</a>
           <span class="Gallery">Gallery</span>
           <span class="member">Membership</span> <!--span är som en osynlig låda för att gruppera texter-->

           </a>
       </h1> <!--Var tvungen att ta reda på span cite:google gemini-->
        

   </header>

<main class="cart-main">
    <div class="cart-left">
        <h1 class="your-bag">Your Cart</h1>
    
    <!-- 
    <div class="cart-labels">
        <span>Products</span>
        <span>Description</span>
        <span>Quantity</span>
        <span>Price</span>
    </div>-->

    </div>
