<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart-AURÈA</title>
    <link rel="stylesheet" href="style.css" />
    <script src="Script.js"></script>
  </head>
  <body>
    <header class="header">
      <nav>
        <a href="index.html" class="home">AURÉA</a>
        <a href="products.html" class="shop">Shop all</a>
        <a href="#" class="Gallery">Gallery</a>
        <a href="#" class="member">Membership</a>
        <!--span is like a transparent box to group the text-->
        <a href="contact.html" class="contact">Contact</a>
        <a href="cart.html" class="cart-logo">
          <img src="images/cart-logo.png" class="cart-logo" />
        </a>
      </nav>
      <!--Had to google span cite:google gemini-->
    </header>

    <main class="cart-main">
      <div class="cart-left">
        <h1 class="your-bag">Your Cart</h1>

  
        <hr />

        <div class="cart-item" id="product-row">
          <img src="images/lipgloss1.png" class="cart-img" />
          <p>Buttergloss</p>

          <p>
            <button onclick="changeQty(-1)" style="cursor: pointer">-</button>
            <span id="quantity">1</span>
            <button onclick="changeQty(1)" style="cursor: pointer">+</button>
          </p>

          <p>199 SEK</p>

          <span onclick="removeProduct()" style="cursor: pointer">&times;</span>
        </div>
        <hr />
      </div>

      <div class="cart-right">
        <h3>Order summary</h3>
        <div class="summary-line">
          <span>1 Product:</span>
          <span>199 SEK</span>
        </div>

        <div class="total-section">
          <p>Total</p>
          <p><span id="total-price">199</span>SEK</p>
        </div>


<a href="Checkout.html">
<button class="checkout-button">Checkout</button>
</a>
        
    </main>
    <footer>
      <p>&copy; AURÉA</p>
    </footer>
  </body>
</html>
